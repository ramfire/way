<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AlfaWay — Monitoring</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --txt:#e2e8f0; --mut:#94a3b8; --line:#334155; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--txt);
           font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
    header { padding:1rem 1.5rem; border-bottom:1px solid var(--line);
             display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; }
    h1 { font-size:1.15rem; margin:0; }
    .tabs { display:flex; gap:.3rem; }
    .tab { font-size:.82rem; }
    .tab.active { background:#334155; border-color:var(--mut); color:#fff; font-weight:600; }
    .stats { display:flex; gap:.6rem; flex-wrap:wrap; }
    .stat { background:var(--card); border:1px solid var(--line); border-radius:8px;
            padding:.35rem .7rem; font-size:.85rem; }
    .stat b { font-size:1.05rem; }
    .spacer { flex:1; }
    .meta { color:var(--mut); font-size:.8rem; display:flex; align-items:center; gap:.8rem; }
    .dot { width:9px; height:9px; border-radius:50%; background:#22c55e; display:inline-block;
           animation:pulse 2s infinite; }
    .dot.paused { background:#eab308; animation:none; }
    .dot.error { background:#ef4444; animation:none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    button, select { background:var(--card); color:var(--txt); border:1px solid var(--line);
             border-radius:6px; padding:.35rem .7rem; cursor:pointer; font-size:.8rem; }
    button:hover, select:hover { border-color:var(--mut); }
    table { width:100%; border-collapse:collapse; font-size:.86rem; }
    th, td { text-align:left; padding:.5rem .75rem; border-bottom:1px solid var(--line);
             white-space:nowrap; }
    th { color:var(--mut); font-weight:600; position:sticky; top:0; background:var(--bg); }
    td.file { font-family: ui-monospace, monospace; }
    .badge { padding:.15rem .55rem; border-radius:999px; font-size:.75rem; font-weight:600; }
    .receiving { background:#1e3a8a; color:#bfdbfe; }
    .stored    { background:#14532d; color:#bbf7d0; }
    .failed    { background:#7f1d1d; color:#fecaca; }
    .deleted   { background:#374151; color:#d1d5db; }
    .missing   { background:#78350f; color:#fed7aa; }
    .archived  { background:#312e81; color:#c7d2fe; }
    /* Axe contrôles — badge « worst-wins » par classe de monitoring (générique,
       tous stages/contrôles). Couleurs par sévérité décroissante (design §5).
       NB: distinct de .archived (axe stockage) — voir design §8. */
    .mc-blocking         { background:#991b1b; color:#fee2e2; box-shadow:inset 2px 0 0 #ef4444; }
    .mc-warning_action   { background:#9a3412; color:#ffedd5; }
    .mc-recycle          { background:#854d0e; color:#fde68a; }
    .mc-reject           { background:#7f1d1d; color:#fecaca; }
    .mc-warning_noaction { background:#334155; color:#cbd5e1; }
    .mc-push             { background:#14532d; color:#bbf7d0; }
    .mc-none             { color:var(--mut); }
    /* Barre de filtre par classe de contrôle (chips, axe contrôles). */
    .cbar { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap;
            padding:.55rem 1.5rem; border-bottom:1px solid var(--line); font-size:.82rem; }
    .cbar:empty { display:none; }
    .cbar .cbar-lbl { color:var(--mut); margin-right:.2rem; }
    /* Statuts de triage (étape 5) : ouvert / en cours / résolu. */
    .tr-open        { background:#334155; color:#cbd5e1; }
    .tr-in_progress { background:#1e3a8a; color:#bfdbfe; }
    .tr-resolved    { background:#14532d; color:#bbf7d0; }
    .tr-owner { color:var(--mut); font-size:.74rem; margin-left:.3rem; }
    .chk { font-size:.8rem; color:var(--mut); display:flex; align-items:center;
           gap:.3rem; cursor:pointer; user-select:none; }
    button.act, button.tri-act { padding:.2rem .55rem; font-size:.76rem; }
    a.dl { color:#7dd3fc; text-decoration:none; }
    a.dl:hover { text-decoration:underline; }
    tr.new td { animation:flash 2.5s ease-out; }
    @keyframes flash { from{background:#3730a3} to{background:transparent} }
    tr.row-failed td { background:rgba(239,68,68,.14); }
    tr.row-failed td:first-child { box-shadow:inset 3px 0 0 #ef4444; }
    .err { background:#7f1d1d; color:#fecaca; padding:.5rem 1.5rem; font-size:.85rem;
           display:none; }
    .empty { color:var(--mut); padding:2rem; text-align:center; }
    th.sortable { cursor:pointer; user-select:none; }
    th.sortable:hover { color:var(--txt); }
    th .arr { color:#7dd3fc; }
    .stat.clickable { cursor:pointer; user-select:none; }
    .stat.clickable:hover { border-color:var(--mut); }
    .stat.active { border-color:#7dd3fc; background:#0c4a6e; }
    .pager { display:flex; align-items:center; gap:.7rem; padding:.6rem 1.5rem;
             color:var(--mut); font-size:.82rem; border-top:1px solid var(--line); }
    .pager:empty { display:none; }
    .pager button[disabled] { opacity:.4; cursor:default; }
    .pager button[disabled]:hover { border-color:var(--line); }
    .pager .pg-pages { margin-left:auto; }
    /* Lignes du board : cliquables (double-clic → détail d'admission). */
    tbody tr[data-id] { cursor:pointer; }
    /* Modale détail d'admission (ouverte au double-clic, pour le support). */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.62);
                align-items:flex-start; justify-content:center; z-index:50; }
    .modal-bg.open { display:flex; }
    .modal { background:var(--card); border:1px solid var(--line); border-radius:10px;
             margin-top:6vh; min-width:540px; max-width:92vw; max-height:84vh; overflow:auto; }
    .modal-head { display:flex; align-items:center; gap:1rem; padding:.75rem 1.1rem;
                  border-bottom:1px solid var(--line); position:sticky; top:0;
                  background:var(--card); }
    .modal-head .m-title { font-weight:600; }
    .modal-head .m-sub { color:var(--mut); font-size:.8rem; font-family:ui-monospace,monospace; }
    .modal-head button { margin-left:auto; padding:.2rem .55rem; }
    .modal table { font-size:.82rem; }
    .modal td.det { color:var(--mut); font-family:ui-monospace,monospace;
                    white-space:normal; max-width:32rem; }
    .modal .res-passed { color:#4ade80; font-weight:600; }
    .modal .res-failed { color:#f87171; font-weight:600; }
    .modal .mclass { color:var(--mut); text-transform:uppercase; font-size:.72rem; }
  </style>
</head>
<body>
  <header>
    <h1>📡 <span id="t-title"></span></h1>
    <div class="tabs">
      <button id="tab-live" class="tab active"></button>
      <button id="tab-history" class="tab"></button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="spacer"></div>
    <div class="meta">
      <span><span class="dot" id="dot"></span> <span id="status"></span></span>
      <span id="count"></span>
      <span id="updated"></span>
      <label class="chk"><input type="checkbox" id="hide-handled"> <span id="t-hide-handled"></span></label>
      <button id="btn-causes"></button>
      <button id="toggle"></button>
      <select id="lang" aria-label="Language">
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="it">Italiano</option>
      </select>
    </div>
  </header>
  <div class="err" id="err"></div>
  <div class="cbar" id="cbar"></div>

  <table>
    <thead>
      <tr id="head">
        <th id="th-state" class="sortable" data-key="state"><span class="lbl"></span><span class="arr"></span></th>
        <th id="th-file" class="sortable" data-key="filename"><span class="lbl"></span><span class="arr"></span></th>
        <th id="th-user" class="sortable" data-key="username"><span class="lbl"></span><span class="arr"></span></th>
        <th id="th-proto" class="sortable" data-key="protocol"><span class="lbl"></span><span class="arr"></span></th>
        <th id="th-ip" class="sortable" data-key="ip"><span class="lbl"></span><span class="arr"></span></th>
        <th id="th-size" class="sortable" data-key="file_size"><span class="lbl"></span><span class="arr"></span></th>
        <th id="th-transfer" class="sortable" data-key="elapsed_ms"><span class="lbl"></span><span class="arr"></span></th>
        <th id="th-received" class="sortable" data-key="received_at"><span class="lbl"></span><span class="arr"></span></th>
        <th id="th-stored" class="sortable" data-key="stored_at"><span class="lbl"></span><span class="arr"></span></th>
        <th id="th-controls" class="sortable" data-key="control"><span class="lbl"></span><span class="arr"></span></th>
        <th></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="pager" id="pager"></div>

  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <div class="modal-head">
        <span>
          <span class="m-title" id="modal-title"></span>
          <span class="m-sub" id="modal-sub"></span>
        </span>
        <button id="modal-close">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

    const REFRESH_MS = 10000;          // 10 s (choix utilisateur)
    const REFRESH_S = REFRESH_MS / 1000;
    const seen = new Set();            // ids déjà affichés → détecter les nouveaux
    let firstLoad = true, paused = false, lastUpdate = null, timer = null;
    let lastData = null;               // dernier feed reçu → re-render au changement de langue
    let view = 'live';                 // 'live' | 'history'
    let sortKey = null;                // null = ordre serveur ; sinon clé de colonne
    let sortDir = 1;                   // 1 = asc, -1 = desc
    let stateFilter = null;            // null = tous ; sinon un état (r.state) à isoler
    let controlFilter = null;          // null = toutes ; sinon une classe de monitoring
    let hideHandled = localStorage.getItem('monitoring_hide_handled') !== '0';  // défaut: masquer
    let offset = 0;                    // décalage de pagination (0 = première page)

    // Colonnes triables : id du <th>, clé de tri (champ de la ligne), clé i18n du libellé.
    // 'th-stored' a un libellé spécial (Stored en Live / Archivé en History) → i18n null.
    const COLS = [
      { id:'th-state',    key:'state',      i18n:'th_state' },
      { id:'th-file',     key:'filename',   i18n:'th_file' },
      { id:'th-user',     key:'username',   i18n:'th_user' },
      { id:'th-proto',    key:'protocol',   i18n:'th_proto' },
      { id:'th-ip',       key:'ip',         i18n:'th_ip' },
      { id:'th-size',     key:'file_size',  i18n:'th_size' },
      { id:'th-transfer', key:'elapsed_ms', i18n:'th_transfer' },
      { id:'th-received', key:'received_at', i18n:'th_received' },
      { id:'th-stored',   key:'stored_at',  i18n:null },
      { id:'th-controls', key:'control',    i18n:'th_controls' },
    ];

    // Classes de monitoring (axe contrôles), de la plus sévère à la moins (worst-wins).
    // Ordre = échelle de sévérité décidée (design §5) ; `none` = aucun contrôle passé.
    // `handled` = clé synthétique du feed (fichiers traités) → chip vert dédié,
    // hors classes de problème ; `none` = aucun contrôle passé.
    const CLASS_ORDER = ['blocking', 'warning_action', 'recycle', 'reject',
                         'warning_noaction', 'push', 'handled', 'none'];

    let lang = localStorage.getItem('monitoring_lang');
    if (!I18N[lang]) lang = 'en';      // défaut : anglais
    const t = (key) => (I18N[lang] || I18N.en)[key];

    const $ = (id) => document.getElementById(id);

    function fmtBytes(n) {
      if (n == null) return '—';
      const L = I18N[lang] || I18N.en;
      if (n < 1024) return n + ' ' + L.bytes_unit;
      let i = -1;
      do { n /= 1024; i++; } while (n >= 1024 && i < L.units.length - 1);
      return n.toLocaleString(L.locale, { minimumFractionDigits: 1, maximumFractionDigits: 1 })
             + ' ' + L.units[i];
    }
    function fmtTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso), loc = (I18N[lang] || I18N.en).locale;
      return d.toLocaleTimeString(loc) + ' ' + d.toLocaleDateString(loc);
    }
    function fmtDuration(ms) {
      if (ms == null) return '—';
      const loc = (I18N[lang] || I18N.en).locale;
      const num = (v, d) => v.toLocaleString(loc, { minimumFractionDigits: d, maximumFractionDigits: d });
      if (ms < 1000) return ms + ' ms';
      if (ms < 60000) return num(ms / 1000, 2) + ' s';
      return Math.floor(ms / 60000) + ' min ' + Math.round((ms % 60000) / 1000) + ' s';
    }
    function esc(s) {
      return (s == null ? '' : String(s)).replace(/[&<>"]/g,
        c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }
    function stateLabel(state) {
      return t('s_' + state) || state;
    }
    function statusText() {
      if (paused) return t('st_paused');
      return t('st_live').replace('{s}', REFRESH_S);
    }

    // --- Tri / filtre (côté SERVEUR, sur toute la base) ------------------------
    // Le tri (?sort=&dir=) et le filtre par état (?state=) sont envoyés au feed ;
    // le serveur les applique sur l'ensemble de la table puis renvoie le top-N.
    // L'UI n'ordonne donc plus localement : elle ré-interroge à chaque changement.
    function updateSortIndicators() {
      COLS.forEach(c => {
        $(c.id).querySelector('.arr').textContent =
          (sortKey === c.key) ? (sortDir === 1 ? ' ▲' : ' ▼') : '';
      });
    }
    function onSort(key) {
      if (sortKey === key) sortDir = -sortDir;   // re-clic → inverse le sens
      else { sortKey = key; sortDir = 1; }
      offset = 0;                                // nouveau tri → retour page 1
      updateSortIndicators();
      poll();                                    // ré-interroge avec le nouveau tri
    }

    // Libellés statiques (chrome) : appliqués au chargement + à chaque changement de langue/vue.
    function applyStaticText() {
      document.documentElement.lang = lang;
      document.title = 'AlfaWay — ' + t('title');
      $('t-title').textContent = t('title');
      // Libellés des colonnes (dans le span .lbl, la flèche de tri vit dans .arr).
      COLS.forEach(c => {
        const label = (c.id === 'th-stored')
          ? ((view === 'history') ? t('th_archived') : t('th_stored'))
          : t(c.i18n);
        $(c.id).querySelector('.lbl').textContent = label;
      });
      updateSortIndicators();
      $('btn-causes').textContent = t('causes_btn');
      $('t-hide-handled').textContent = t('hide_handled');
      $('hide-handled').checked = hideHandled;
      $('toggle').textContent = paused ? t('btn_resume') : t('btn_pause');
      $('lang').value = lang;
      $('status').textContent = lastUpdate ? statusText() : t('st_starting');
    }

    function renderTabs(data) {
      const hc = data ? (data.history_total || 0) : 0;
      $('tab-live').textContent = t('tab_live');
      $('tab-history').textContent = t('tab_history') + (hc ? ` (${hc})` : '');
      $('tab-live').classList.toggle('active', view === 'live');
      $('tab-history').classList.toggle('active', view === 'history');
    }

    // Un chip de stat. state='' → « Total » (clic = réinitialise le filtre, sans badge).
    function statChip(state, label, count) {
      const active = (stateFilter === state && state) ? ' active' : '';
      const inner = state ? `<span class="badge ${esc(state)}">${esc(label)}</span>` : esc(label);
      return `<span class="stat clickable${active}" data-state="${esc(state)}">${inner} <b>${count}</b></span>`;
    }
    function renderStats(data) {
      const ps = data.per_state || {};
      if (view === 'history') {
        $('stats').innerHTML =
          statChip('', t('total'), data.history_total||0) +
          statChip('archived', t('s_archived'), ps.archived||0) +
          statChip('deleted', t('s_deleted'), ps.deleted||0) +
          statChip('missing', t('s_missing'), ps.missing||0);
      } else {
        $('stats').innerHTML =
          statChip('', t('total'), data.live_total||0) +
          statChip('receiving', t('receiving'), ps.receiving||0) +
          statChip('stored', t('stored'), ps.stored||0) +
          statChip('failed', t('failed'), ps.failed||0);
      }
    }

    // Badge « worst-wins » de l'axe contrôles : la classe de monitoring la plus
    // sévère parmi l'état courant des contrôles du fichier (control_class matérialisé,
    // générique tous stages). `mc-none` = aucun contrôle encore passé. Détail complet
    // par contrôle au double-clic (modale).
    function controlBadge(r) {
      const c = r.control_class;
      // Fichier traité (triage resolved) : le contrôle est résolu → badge vert,
      // quelle que soit sa classe d'origine (recycle/reject/…). Le verdict réel
      // (modale) reste inchangé ; « Rouvrir » rétablit la classe d'origine.
      if (r.triage === 'resolved' && c && c !== 'push')
        return `<span class="badge tr-resolved">${esc(t('tr_handled'))}</span>`;
      if (!c) return `<span class="mc-none">${esc(t('mc_none'))}</span>`;
      return `<span class="badge mc-${esc(c)}">${esc(t('mc_' + c) || c)}</span>`;
    }

    // Chips de filtre par classe de monitoring (axe contrôles), ordonnés du plus
    // sévère au moins sévère ; on n'affiche que les classes présentes (count > 0).
    function controlChip(cls, count) {
      const active = (controlFilter === cls) ? ' active' : '';
      // `handled` : libellé + badge vert « traité » (réutilise tr-resolved).
      const label = (cls === 'handled') ? t('tr_handled') : (t('mc_' + cls) || cls);
      const inner = (cls === 'none') ? esc(label)
        : (cls === 'handled') ? `<span class="badge tr-resolved">${esc(label)}</span>`
        : `<span class="badge mc-${esc(cls)}">${esc(label)}</span>`;
      return `<span class="stat clickable${active}" data-control="${esc(cls)}">${inner} <b>${count}</b></span>`;
    }
    function renderControlChips(data) {
      const pc = data.per_control_class || {};
      const chips = CLASS_ORDER.filter(c => pc[c]).map(c => controlChip(c, pc[c]));
      $('cbar').innerHTML = chips.length
        ? `<span class="cbar-lbl">${esc(t('ctl_filter'))} :</span>` + chips.join('')
        : '';
    }

    // Bouton « Causes » : compteur des fichiers « à attention » (classe ≠ push/none),
    // dérivé des compteurs déjà renvoyés par le feed (pas d'appel réseau).
    function updateCausesBtn(data) {
      const pc = data.per_control_class || {};
      const n = ['blocking', 'warning_action', 'recycle', 'reject', 'warning_noaction']
        .reduce((s, k) => s + (pc[k] || 0), 0);
      $('btn-causes').textContent = t('causes_btn') + (n ? ` (${n})` : '');
    }

    function renderRows(rows) {
      if (!rows.length) {
        const msg = stateFilter ? t('empty_filter')
          : (view === 'history') ? t('empty_history') : t('empty');
        $('rows').innerHTML = `<tr><td colspan="11" class="empty">${msg}</td></tr>`;
        return;
      }
      $('rows').innerHTML = rows.map(r => {
        const isNew = !firstLoad && !seen.has(r.id);
        const cls = [isNew ? 'new' : '', r.state === 'failed' ? 'row-failed' : '']
          .filter(Boolean).join(' ');
        const acts = [];
        if (r.downloadable)
          acts.push(`<a class="dl" href="/files/${r.id}/download/">${t('download')}</a>`);
        if (view === 'live' && r.can_archive)
          acts.push(`<button class="act" data-act="archive" data-id="${r.id}">${t('archive')}</button>`);
        if (view === 'history' && r.can_restore)
          acts.push(`<button class="act" data-act="restore" data-id="${r.id}">${t('restore')}</button>`);
        // Triage fichier (étape 5) : seulement pour les fichiers à classe non-OK.
        // Le badge « traité » vit désormais dans la colonne Contrôles (vert) ;
        // ici on ne garde que l'action : Rouvrir (si traité) ou Traiter.
        if (r.control_class && r.control_class !== 'push') {
          if (r.triage === 'resolved')
            acts.push(`<button class="tri-act" data-tri="reopen" data-id="${r.id}">${t('tr_unmark')}</button>`);
          else
            acts.push(`<button class="tri-act" data-tri="resolve" data-id="${r.id}">${t('tr_mark')}</button>`);
        }
        const dl = acts.join(' ');
        // Dernière colonne « horodatage » : stockage (Live) ou archivage/suppression (History).
        const lastTime = (view === 'history')
          ? (r.archived_at || r.deleted_at || r.stored_at) : r.stored_at;
        return `<tr class="${cls}" data-id="${r.id}">
          <td><span class="badge ${esc(r.state)}">${esc(stateLabel(r.state))}</span></td>
          <td class="file" title="${esc(r.path)}">${esc(r.filename)}</td>
          <td>${esc(r.username)}</td>
          <td>${esc(r.protocol)}</td>
          <td>${esc(r.ip)}</td>
          <td>${fmtBytes(r.file_size)}</td>
          <td>${fmtDuration(r.elapsed_ms)}</td>
          <td>${fmtTime(r.received_at)}</td>
          <td>${fmtTime(lastTime)}</td>
          <td>${controlBadge(r)}</td>
          <td>${dl}</td>
        </tr>`;
      }).join('');
    }

    // Pagination (côté serveur via ?offset=&limit=). Le pager n'apparaît que si le
    // total filtré dépasse une page ; sinon il est vide (donc masqué en CSS).
    function renderPager(data) {
      const total = data.matched_total || 0;
      const lim = data.limit || 50;
      const off = data.offset || 0;
      const shown = (data.returned != null) ? data.returned
        : (data.rows ? data.rows.length : 0);
      if (total <= lim) { $('pager').innerHTML = ''; return; }
      const from = total ? off + 1 : 0;
      const to = off + shown;
      const page = Math.floor(off / lim) + 1;
      const pages = Math.max(1, Math.ceil(total / lim));
      const prevDis = off <= 0 ? 'disabled' : '';
      const nextDis = (off + lim) >= total ? 'disabled' : '';
      $('pager').innerHTML =
        `<button id="pg-prev" ${prevDis}>${esc(t('pg_prev'))}</button>` +
        `<button id="pg-next" ${nextDis}>${esc(t('pg_next'))}</button>` +
        `<span>${t('pg_range').replace('{a}', from).replace('{b}', to).replace('{m}', total)}</span>` +
        `<span class="pg-pages">${t('pg_page').replace('{p}', page).replace('{n}', pages)}</span>`;
    }

    // Rendu du feed courant : stats + tabs + lignes (déjà triées/filtrées côté serveur).
    // Le suivi `seen` porte sur toutes les lignes reçues → pas de faux « flash nouveau ».
    function renderFeed() {
      if (!lastData) return;
      renderStats(lastData);
      renderControlChips(lastData);
      updateCausesBtn(lastData);
      renderTabs(lastData);
      renderRows(lastData.rows);
      renderPager(lastData);
      lastData.rows.forEach(r => seen.add(r.id));
      firstLoad = false;
    }

    // Re-render complet depuis le dernier feed (sans refaire d'appel réseau).
    function rerender() {
      applyStaticText();
      renderFeed();
    }

    // URL du feed = vue + filtre/tri courants (appliqués côté serveur sur toute la base).
    function feedUrl() {
      const p = new URLSearchParams({ view });
      if (stateFilter) p.set('state', stateFilter);
      if (controlFilter) p.set('control', controlFilter);
      if (!hideHandled) p.set('show_handled', '1');   // défaut serveur = masquer
      if (sortKey) { p.set('sort', sortKey); p.set('dir', sortDir === 1 ? 'asc' : 'desc'); }
      if (offset) p.set('offset', offset);
      return '/monitoring/feed/?' + p.toString();
    }

    async function poll() {
      try {
        const res = await fetch(feedUrl(), { credentials: 'same-origin' });
        if (res.redirected || res.status === 403 || res.status === 302) {
          throw new Error(t('err_session'));
        }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        // Ignore une réponse tardive qui ne correspond plus à la vue courante.
        if (data.view && data.view !== view) return;
        // Resynchronise l'offset sur celui renvoyé (le serveur a pu le recaler
        // sur la dernière page si le total a diminué entre deux polls).
        if (typeof data.offset === 'number') offset = data.offset;
        lastData = data;
        renderFeed();
        lastUpdate = Date.now();
        $('err').style.display = 'none';
        $('dot').className = paused ? 'dot paused' : 'dot';
        $('status').textContent = statusText();
      } catch (e) {
        $('dot').className = 'dot error';
        $('status').textContent = t('st_error');
        $('err').textContent = '⚠ ' + e.message;
        $('err').style.display = 'block';
      }
    }

    function switchView(v) {
      if (v === view) return;
      view = v;
      stateFilter = null;                   // les états diffèrent entre Live et History
      controlFilter = null;                 // repart sans filtre de classe
      offset = 0;                           // nouvelle vue → retour page 1
      seen.clear(); firstLoad = true;       // pas de « flash nouveau » au changement de vue
      applyStaticText();
      renderTabs(lastData);
      $('rows').innerHTML = `<tr><td colspan="11" class="empty">${t('loading')}</td></tr>`;
      poll();
    }

    function tickAgo() {
      if (!lastUpdate) return;
      const s = Math.round((Date.now() - lastUpdate) / 1000);
      $('updated').textContent = t('updated').replace('{s}', s);
    }

    function schedule() {
      clearInterval(timer);
      if (!paused) timer = setInterval(poll, REFRESH_MS);
    }

    $('tab-live').addEventListener('click', () => switchView('live'));
    $('tab-history').addEventListener('click', () => switchView('history'));

    // Tri : clic sur un en-tête de colonne (délégation sur la ligne d'en-têtes).
    $('head').addEventListener('click', (e) => {
      const th = e.target.closest('th[data-key]');
      if (th) onSort(th.dataset.key);
    });

    // Filtre par état : clic sur un chip de stat. « Total » (data-state="") réinitialise ;
    // re-clic sur l'état actif réinitialise aussi.
    $('stats').addEventListener('click', (e) => {
      const chip = e.target.closest('.stat');
      if (!chip) return;
      const s = chip.dataset.state || '';
      stateFilter = (s && stateFilter !== s) ? s : null;
      offset = 0;                             // nouveau filtre → retour page 1
      if (lastData) renderStats(lastData);   // surbrillance du chip immédiate
      poll();                                 // ré-interroge avec le nouveau filtre
    });

    // Filtre par classe de contrôle : clic sur un chip de la barre Contrôles.
    // Re-clic sur la classe active réinitialise (toggle).
    $('cbar').addEventListener('click', (e) => {
      const chip = e.target.closest('.stat');
      if (!chip) return;
      const c = chip.dataset.control;
      controlFilter = (controlFilter === c) ? null : c;
      offset = 0;                             // nouveau filtre → retour page 1
      if (lastData) renderControlChips(lastData);   // surbrillance immédiate
      poll();
    });

    $('toggle').addEventListener('click', () => {
      paused = !paused;
      $('toggle').textContent = paused ? t('btn_resume') : t('btn_pause');
      $('dot').className = paused ? 'dot paused' : 'dot';
      $('status').textContent = statusText();
      schedule();
      if (!paused) poll();
    });

    $('hide-handled').addEventListener('change', (e) => {
      hideHandled = e.target.checked;
      localStorage.setItem('monitoring_hide_handled', hideHandled ? '1' : '0');
      offset = 0;                              // le total change → retour page 1
      poll();
    });

    $('lang').addEventListener('change', (e) => {
      lang = I18N[e.target.value] ? e.target.value : 'en';
      localStorage.setItem('monitoring_lang', lang);
      rerender();
      tickAgo();
    });

    // --- Actions par ligne (Archive en Live / Restore en History) -------------
    function getCookie(name) {
      const m = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
      return m ? m.pop() : '';
    }
    async function doAction(act, id) {
      try {
        const res = await fetch(`/files/${id}/${act}/`, {
          method: 'POST',
          headers: { 'X-CSRFToken': getCookie('csrftoken') },
          credentials: 'same-origin',
        });
        if (res.redirected || res.status === 403 || res.status === 302) {
          throw new Error(t('err_session'));
        }
        if (!res.ok) {
          let msg = 'HTTP ' + res.status;
          try { const j = await res.json(); if (j.detail) msg = j.detail; } catch (_) {}
          throw new Error(msg);
        }
        $('err').style.display = 'none';
        poll();   // la ligne disparaît de Live / apparaît en History
      } catch (e) {
        $('err').textContent = '⚠ ' + e.message;
        $('err').style.display = 'block';
      }
    }
    // Triage fichier (étape 5) : resolve (marque traité) / reopen (retire l'override).
    async function doTriageFile(action, id) {
      try {
        const res = await fetch(`/monitoring/triage/file/${id}/`, {
          method: 'POST',
          headers: { 'X-CSRFToken': getCookie('csrftoken'),
                     'Content-Type': 'application/x-www-form-urlencoded' },
          credentials: 'same-origin', body: 'action=' + encodeURIComponent(action),
        });
        if (res.redirected || res.status === 403 || res.status === 302) throw new Error(t('err_session'));
        if (!res.ok) throw new Error('HTTP ' + res.status);
        $('err').style.display = 'none';
        poll();   // re-render : badge « traité » / action mise à jour
      } catch (e) {
        $('err').textContent = '⚠ ' + e.message;
        $('err').style.display = 'block';
      }
    }
    // Délégation : les lignes sont re-rendues via innerHTML, on écoute le tbody.
    $('rows').addEventListener('click', (e) => {
      const tri = e.target.closest('button.tri-act');
      if (tri) { doTriageFile(tri.dataset.tri, tri.dataset.id); return; }
      const btn = e.target.closest('button.act');
      if (btn) doAction(btn.dataset.act, btn.dataset.id);
    });

    // --- Détail d'admission (modale, double-clic sur une ligne) ----------------
    // Pour le support : déroule tous les contrôles d'admission du fichier (chaque
    // contrôle + verdict, du plus ancien au plus récent). Lecture seule.
    function ctrlLabel(c) { return t('ctrl_' + c) || c; }
    // Résumé lisible du `detail` JSON d'un événement (raison + champs utiles).
    function admDetailText(d) {
      if (!d || typeof d !== 'object') return '—';
      const bits = [];
      if (d.reason) bits.push(d.reason);
      if (d.verdict) bits.push('verdict=' + d.verdict);
      if (d.partner_status) bits.push('status=' + d.partner_status);
      if (d.username) bits.push('user=' + d.username);
      if (d.path) bits.push('path=' + d.path);
      if (Array.isArray(d.allowed_prefixes)) bits.push('allowed=' + d.allowed_prefixes.join(','));
      if (d.first) bits.push('first');
      return bits.length ? bits.join(' · ') : '—';
    }
    function renderAdmission(data) {
      $('modal-title').textContent = t('adm_title');
      $('modal-sub').textContent = (data.filename || '') +
        (data.username ? ' — ' + data.username : '');
      // Bouton « Rejouer l'admission » (mécanisme recycle) : après enrôlement du
      // partenaire / canal, l'opérateur relance file_admission depuis ici.
      const replay = `<div style="margin-bottom:.6rem">`
        + `<button class="act" id="adm-replay" data-id="${esc(String(data.id))}">${esc(t('adm_replay'))}</button></div>`;
      const ev = data.events || [];
      if (!ev.length) {
        $('modal-body').innerHTML = replay + `<div class="empty">${esc(t('adm_no_events'))}</div>`;
        return;
      }
      const rows = ev.map(e => `
        <tr>
          <td>${esc(ctrlLabel(e.control))}</td>
          <td class="res-${esc(e.result)}">${esc(t('adm_r_' + e.result) || e.result)}</td>
          <td class="mclass">${esc(e.monitoring_class)}</td>
          <td class="det">${esc(admDetailText(e.detail))}</td>
          <td>${esc(fmtTime(e.created_at))}</td>
        </tr>`).join('');
      $('modal-body').innerHTML = replay + `<table><thead><tr>
          <th>${esc(t('adm_c_control'))}</th><th>${esc(t('adm_c_result'))}</th>
          <th>${esc(t('adm_c_class'))}</th><th>${esc(t('adm_c_detail'))}</th>
          <th>${esc(t('adm_c_time'))}</th>
        </tr></thead><tbody>${rows}</tbody></table>`;
    }
    // Rejeu de l'admission depuis la modale (POST). Réémet un verdict (append-only,
    // idempotent, n'altère pas `state`), ré-affiche les contrôles à jour et fait
    // repoller le board (le fichier quitte « recycle » s'il est désormais admis).
    async function replayAdmission(id) {
      const btn = $('adm-replay');
      if (btn) { btn.disabled = true; btn.textContent = t('adm_replaying'); }
      try {
        const res = await fetch(`/monitoring/admission/${id}/replay/`, {
          method: 'POST',
          headers: { 'X-CSRFToken': getCookie('csrftoken') },
          credentials: 'same-origin',
        });
        if (res.redirected || res.status === 403 || res.status === 302) throw new Error(t('err_session'));
        if (!res.ok) {
          let msg = 'HTTP ' + res.status;
          try { const j = await res.json(); if (j.detail) msg = j.detail; } catch (_) {}
          throw new Error(msg);
        }
        const data = await res.json();
        renderAdmission(data);   // re-render avec le nouveau verdict en tête
        $('modal-body').insertAdjacentHTML('afterbegin',
          `<div class="empty">${esc(t('adm_replayed').replace('{v}', data.verdict))}</div>`);
        poll();                  // rafraîchit le board (worst-wins rematérialisé)
      } catch (e) {
        $('modal-body').insertAdjacentHTML('afterbegin', `<div class="empty">⚠ ${esc(e.message)}</div>`);
        const b = $('adm-replay'); if (b) { b.disabled = false; b.textContent = t('adm_replay'); }
      }
    }
    async function openAdmission(id) {
      $('modal-title').textContent = t('adm_title');
      $('modal-sub').textContent = '';
      $('modal-body').innerHTML = `<div class="empty">${esc(t('loading'))}</div>`;
      $('modal-bg').classList.add('open');
      try {
        const res = await fetch(`/monitoring/admission/${id}/`, { credentials: 'same-origin' });
        if (res.redirected || res.status === 403 || res.status === 302) {
          throw new Error(t('err_session'));
        }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        renderAdmission(await res.json());
      } catch (e) {
        $('modal-body').innerHTML = `<div class="empty">⚠ ${esc(e.message)}</div>`;
      }
    }
    function closeModal() { $('modal-bg').classList.remove('open'); }
    // Double-clic sur une ligne (délégation : tbody re-rendu via innerHTML).
    $('rows').addEventListener('dblclick', (e) => {
      const tr = e.target.closest('tr[data-id]');
      if (tr) openAdmission(tr.dataset.id);
    });
    // Délégation : modal-body est re-rendu via innerHTML (le bouton est recréé).
    $('modal-body').addEventListener('click', (e) => {
      const rb = e.target.closest('#adm-replay');
      if (rb) replayAdmission(rb.dataset.id);
    });
    $('modal-close').addEventListener('click', closeModal);
    $('modal-bg').addEventListener('click', (e) => {   // clic hors carte = fermeture
      if (e.target === $('modal-bg')) closeModal();
    });
    document.addEventListener('keydown', (e) => {       // Échap = fermeture
      if (e.key === 'Escape') closeModal();
    });

    // --- Vue agrégée « par cause » (complément, réutilise la modale) -----------
    // Boutons de triage d'une cause selon son statut courant (claim/resolve/reopen).
    // Les data-* portent la signature de cause → POST par le handler délégué.
    function triageButtons(c) {
      const d = `data-stage="${esc(c.stage)}" data-control="${esc(c.control)}"`
        + ` data-mclass="${esc(c.monitoring_class)}" data-reason="${esc(c.reason)}"`;
      const b = (action, key) => `<button class="act tr-btn" ${d} data-action="${action}">${esc(t(key))}</button>`;
      const st = c.triage.status;
      if (st === 'resolved') return b('reopen', 'tr_reopen');
      if (st === 'in_progress') return b('resolve', 'tr_resolve') + ' ' + b('reopen', 'tr_reopen');
      return b('claim', 'tr_claim') + ' ' + b('resolve', 'tr_resolve');   // open
    }
    function renderCauses(data) {
      $('modal-title').textContent = t('causes_title');
      // Sous-titre : fichiers concernés + restant à traiter après réconciliation.
      $('modal-sub').textContent = t('causes_sub').replace('{n}', data.files_affected || 0)
        + ` · ${t('cz_open')}: ${data.files_open || 0}`;
      const cz = data.causes || [];
      if (!cz.length) {
        $('modal-body').innerHTML = `<div class="empty">${esc(t('causes_empty'))}</div>`;
        return;
      }
      const rows = cz.map(c => {
        const cause = `${esc(c.stage)} / ${esc(ctrlLabel(c.control))}`
          + (c.reason && c.reason !== '—' ? ` · <span class="det">${esc(c.reason)}</span>` : '');
        const partners = c.top_users.map(u => `${esc(u.username || '∅')} (${u.count})`).join(', ') || '—';
        // « Fichiers » : total + restant à traiter si différent (réconciliation triage).
        const files = (c.open_count !== c.count)
          ? `<b>${c.count}</b> <span class="tr-owner">(${t('cz_open')}: ${c.open_count})</span>`
          : `<b>${c.count}</b>`;
        const owner = c.triage.owner ? `<span class="tr-owner">${esc(c.triage.owner)}</span>` : '';
        const triage = `<span class="badge tr-${esc(c.triage.status)}">${esc(t('tr_' + c.triage.status))}</span>${owner}`
          + `<div style="margin-top:.3rem">${triageButtons(c)}</div>`;
        return `<tr>
          <td>${cause}</td>
          <td><span class="badge mc-${esc(c.monitoring_class)}">${esc(t('mc_' + c.monitoring_class) || c.monitoring_class)}</span></td>
          <td>${files}</td>
          <td>${partners}</td>
          <td>${triage}</td>
          <td class="det">${c.examples.map(esc).join(', ')}</td>
        </tr>`;
      }).join('');
      $('modal-body').innerHTML = `<table><thead><tr>
          <th>${esc(t('cz_cause'))}</th><th>${esc(t('cz_class'))}</th><th>${esc(t('cz_files'))}</th>
          <th>${esc(t('cz_partners'))}</th><th>${esc(t('cz_status'))}</th><th>${esc(t('cz_examples'))}</th>
        </tr></thead><tbody>${rows}</tbody></table>`;
    }

    // POST d'une action de triage de cause, puis rafraîchit la modale + le board.
    async function postTriageCause(sig, action) {
      const body = new URLSearchParams({ ...sig, action });
      const res = await fetch('/monitoring/triage/cause/', {
        method: 'POST',
        headers: { 'X-CSRFToken': getCookie('csrftoken'),
                   'Content-Type': 'application/x-www-form-urlencoded' },
        credentials: 'same-origin', body: body.toString(),
      });
      if (res.redirected || res.status === 403 || res.status === 302) throw new Error(t('err_session'));
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }
    // Délégation : clic sur un bouton de triage de cause dans la modale.
    $('modal-body').addEventListener('click', async (e) => {
      const btn = e.target.closest('button.tr-btn');
      if (!btn) return;
      const d = btn.dataset;
      try {
        await postTriageCause({ stage: d.stage, control: d.control,
                                monitoring_class: d.mclass, reason: d.reason }, d.action);
        openCauses();   // recharge la modale (statuts + compteurs à jour)
      } catch (err) {
        $('modal-sub').textContent = '⚠ ' + err.message;
      }
    });
    async function openCauses() {
      $('modal-title').textContent = t('causes_title');
      $('modal-sub').textContent = '';
      $('modal-body').innerHTML = `<div class="empty">${esc(t('loading'))}</div>`;
      $('modal-bg').classList.add('open');
      try {
        const res = await fetch(`/monitoring/causes/?view=${view}`, { credentials: 'same-origin' });
        if (res.redirected || res.status === 403 || res.status === 302) {
          throw new Error(t('err_session'));
        }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        renderCauses(await res.json());
      } catch (e) {
        $('modal-body').innerHTML = `<div class="empty">⚠ ${esc(e.message)}</div>`;
      }
    }
    $('btn-causes').addEventListener('click', openCauses);

    // Pagination : Préc./Suiv. (délégation, le pager est re-rendu via innerHTML).
    $('pager').addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn || btn.disabled) return;
      const lim = (lastData && lastData.limit) || 50;
      if (btn.id === 'pg-prev') offset = Math.max(0, offset - lim);
      else if (btn.id === 'pg-next') offset += lim;
      seen.clear(); firstLoad = true;     // pas de « flash nouveau » au changement de page
      poll();
    });

    // Économie : on suspend le polling quand l'onglet n'est pas visible.
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) { clearInterval(timer); }
      else if (!paused) { poll(); schedule(); }
    });

    applyStaticText();
    renderTabs(null);
    $('rows').innerHTML = `<tr><td colspan="11" class="empty">${t('loading')}</td></tr>`;
    poll();
    schedule();
    setInterval(tickAgo, 1000);
  </script>
</body>
</html>
