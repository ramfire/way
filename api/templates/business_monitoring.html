<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AlfaWay — Business Monitoring</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --txt:#e2e8f0; --mut:#94a3b8; --line:#334155; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--txt);
           font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
    header { padding:1rem 1.5rem; border-bottom:1px solid var(--line);
             display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; }
    h1 { font-size:1.15rem; margin:0; }
    .spacer { flex:1; }
    .meta { color:var(--mut); font-size:.8rem; display:flex; align-items:center; gap:.8rem; }
    .dot { width:9px; height:9px; border-radius:50%; background:#22c55e; display:inline-block;
           animation:pulse 2s infinite; }
    .dot.error { background:#ef4444; animation:none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    a.navlink { color:var(--mut); font-size:.82rem; text-decoration:none; }
    a.navlink:hover { color:#fff; }
    button { background:var(--card); color:var(--txt); border:1px solid var(--line);
             border-radius:6px; padding:.35rem .7rem; cursor:pointer; font-size:.8rem; }
    button:hover { border-color:var(--mut); }
    .chips { display:flex; gap:.5rem; flex-wrap:wrap; padding:.8rem 1.5rem 0; }
    .chip { background:var(--card); border:1px solid var(--line); border-radius:999px;
            padding:.3rem .8rem; font-size:.8rem; cursor:pointer; }
    .chip.active { outline:2px solid var(--mut); }
    .chip b { font-size:.95rem; }
    table { width:100%; border-collapse:collapse; font-size:.86rem; margin-top:.6rem; }
    th, td { text-align:left; padding:.5rem .9rem; border-bottom:1px solid var(--line);
             white-space:nowrap; }
    th { color:var(--mut); font-weight:600; position:sticky; top:0; background:var(--bg); }
    td.mono { font-family: ui-monospace, monospace; }
    .arrow { color:var(--mut); }
    .badge { padding:.15rem .55rem; border-radius:999px; font-size:.75rem; font-weight:600; }
    .mc-blocking         { background:#991b1b; color:#fee2e2; box-shadow:inset 2px 0 0 #ef4444; }
    .mc-warning_action   { background:#9a3412; color:#ffedd5; }
    .mc-recycle          { background:#854d0e; color:#fde68a; }
    .mc-reject           { background:#7f1d1d; color:#fecaca; }
    .mc-warning_noaction { background:#334155; color:#cbd5e1; }
    .mc-push             { background:#14532d; color:#bbf7d0; }
    .known   { background:#14532d; color:#bbf7d0; }
    .candidate { background:#9a3412; color:#ffedd5; }
    .empty { padding:2rem 1.5rem; color:var(--mut); }
  </style>
</head>
<body>
  <header>
    <h1>AlfaWay — <span data-i18n="title">Business monitoring</span></h1>
    <a class="navlink" href="/monitoring/">← <span data-i18n="itboard">IT board</span></a>
    <span class="spacer"></span>
    <div class="meta">
      <span id="count"></span>
      <span><span class="dot" id="dot"></span> <span data-i18n="live">live</span></span>
      <button id="lang">FR</button>
    </div>
  </header>

  <div class="chips" id="chips"></div>

  <table>
    <thead>
      <tr>
        <th data-i18n="subfund">Sub-fund</th>
        <th data-i18n="valdate">Valuation date</th>
        <th data-i18n="feed">Feed</th>
        <th data-i18n="verdict">Verdict</th>
        <th data-i18n="known">Known?</th>
        <th data-i18n="file">Source file</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty" id="empty" hidden data-i18n="none">No partition yet.</div>

<script>
  const REFRESH_MS = 10000;                 // 10 s — aligné sur le board IT
  const FEED = '/monitoring/business/feed/';
  let control = null;                        // filtre control_class courant

  const I18N = {
    en: {title:'Business monitoring', itboard:'IT board', live:'live', subfund:'Sub-fund',
         valdate:'Valuation date', feed:'Feed', verdict:'Verdict', known:'Known?',
         file:'Source file', none:'No partition yet.', all:'All', fails:'Fails',
         candidate:'candidate', yes:'known'},
    fr: {title:'Supervision métier', itboard:'board IT', live:'live', subfund:'Sous-fonds',
         valdate:'Date de valo', feed:'Flux', verdict:'Verdict', known:'Connu ?',
         file:'Fichier source', none:'Aucune partition.', all:'Tout', fails:'Échecs',
         candidate:'candidat', yes:'connu'},
  };
  let lang = localStorage.getItem('bm_lang') || 'en';

  function applyI18n() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      if (I18N[lang][k]) el.textContent = I18N[lang][k];
    });
    document.getElementById('lang').textContent = lang === 'en' ? 'FR' : 'EN';
    document.documentElement.lang = lang;
  }
  document.getElementById('lang').onclick = () => {
    lang = lang === 'en' ? 'fr' : 'en';
    localStorage.setItem('bm_lang', lang);
    applyI18n(); poll();
  };

  function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>]/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  function renderChips(per, fails, total) {
    const t = I18N[lang];
    const box = document.getElementById('chips');
    const items = [['', t.all, total], ['fails', t.fails, fails]];
    Object.keys(per).forEach(c => { if (per[c]) items.push([c, c, per[c]]); });
    box.innerHTML = items.map(([key, label, n]) => {
      const active = (key === '' && !control) || key === control ? ' active' : '';
      const cls = (key && key !== 'fails') ? ` badge mc-${key}` : '';
      return `<span class="chip${active}" data-key="${key}">
        <span class="${cls}">${esc(label)}</span> <b>${n}</b></span>`;
    }).join('');
    box.querySelectorAll('.chip').forEach(ch => ch.onclick = () => {
      const k = ch.getAttribute('data-key');
      control = k || null; poll();
    });
  }

  function renderRows(rows) {
    const t = I18N[lang];
    const tb = document.getElementById('rows');
    document.getElementById('empty').hidden = rows.length > 0;
    tb.innerHTML = rows.map(r => {
      const sf = r.sub_fund_key
        ? `<span class="mono">${esc(r.sub_fund_value)}</span> <span class="arrow">→</span> <b>${esc(r.sub_fund_key)}</b>`
        : `<span class="mono">${esc(r.sub_fund_value)}</span>`;
      const known = r.is_known_subfund
        ? `<span class="badge known">✓ ${t.yes}</span>`
        : `<span class="badge candidate">${t.candidate}</span>`;
      return `<tr>
        <td>${sf}</td>
        <td class="mono">${esc(r.valuation_date_value)}</td>
        <td>${esc(r.feed)}</td>
        <td><span class="badge mc-${r.control_class}">${esc(r.control_class)}</span></td>
        <td>${known}</td>
        <td class="mono">#${r.received_file_id}</td>
      </tr>`;
    }).join('');
  }

  async function poll() {
    try {
      const url = FEED + (control ? `?control=${encodeURIComponent(control)}` : '');
      const res = await fetch(url, {credentials: 'same-origin'});
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      renderChips(data.per_class, data.fails_total, data.total);
      renderRows(data.rows);
      document.getElementById('count').textContent =
        `${data.returned} / ${data.matched_total}`;
      document.getElementById('dot').classList.remove('error');
    } catch (e) {
      document.getElementById('dot').classList.add('error');
    }
  }

  applyI18n();
  poll();
  setInterval(poll, REFRESH_MS);
</script>
</body>
</html>
